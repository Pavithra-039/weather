<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌦️ Weather Data Analysis</h1>
        <p>Temperature Trend Prediction using Machine Learning</p>

        <div class="input-box">
            <label for="year">Enter Year:</label>
            <input type="number" id="year" placeholder="e.g. 2025">
            <button onclick="predictTemperature()">Predict Temperature</button>
        </div>

        <div class="output-box">
            <h2 id="result">Predicted Temperature: -- °C</h2>
        </div>

        <footer>
            <p>Developed by <b>Pavithra </b> </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
